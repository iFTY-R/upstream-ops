services:
  mysql:
    image: mysql:8.4
    container_name: upstreamops-mysql
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      MYSQL_DATABASE: ${MYSQL_DATABASE:-upstreamops}
      MYSQL_USER: ${MYSQL_USER:-upstreamops}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change-me}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change-me-root}
    ports:
      - "${MYSQL_PORT:-33069}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u${MYSQL_USER:-upstreamops} -p${MYSQL_PASSWORD:-change-me}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  app:
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_DRIVER: mysql
      DATABASE_HOST: mysql
      DATABASE_PORT: 3306
      DATABASE_USER: ${MYSQL_USER:-upstreamops}
      DATABASE_PASSWORD: ${MYSQL_PASSWORD:-change-me}
      DATABASE_NAME: ${MYSQL_DATABASE:-upstreamops}

volumes:
  mysql-data:
